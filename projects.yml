# projects.yml — source of truth for what the pipeline knows about each project.
# Add a new project = add a YAML block. No code changes needed.
#
# Required fields per project:
#   repo                — github URL
#   kind                — what the project IS (maps into surfaces.yml kinds)
#   audience            — who the project is FOR (maps into surfaces.yml audiences)
#   status              — live | wip | archived
#   problem             — concrete problem in TARGET USER'S language (not AI-industry language)
#   solution_one_liner  — what the project does, one sentence, no fluff
#   facts[]             — the ONLY claims the drafter is allowed to make; validator grounds against this
#   angles[]            — rotation pool; drafter picks one per post
#   channels[]          — which daily-loop channels to post to (subset of audience.daily_social + content_blogs)
#
# Voice rule: `problem` and `solution_one_liner` are read verbatim into the drafter prompt.
# Write them the way the target user would describe the problem to a friend, not the way
# a product page would.

konid:
  repo: https://github.com/robertnowell/konid-language-learning
  kind: mcp-server
  audience: mcp-users
  status: live
  problem: "I wanted to tell my girlfriend 'I missed you today' in her first language
    and have it sound real, not like a phrasebook. Or I translate work emails every
    day in a language I'm still learning and want each translation to actually teach
    me something, not just get me through the task. Literal translation tools give
    you one answer with no register, no cultural context, no nuance between options."
  solution_one_liner: "A language coach that returns three options (casual to formal)
    for anything you want to say, with cultural context, nuance notes, and audio pronunciation."
  facts:
    - "Returns 3 options per query, ordered casual → formal, with the register explained."
    - "Supports 13+ languages including Mandarin, Japanese, Korean, Spanish, French,
      German, Portuguese, Italian, Russian, Arabic, and Hindi."
    - "Works as an MCP server with Claude Code (`claude mcp add konid-ai -- npx -y
      konid-ai`), Cursor, VS Code Copilot, Windsurf, Zed, JetBrains, and Claude Cowork."
    - "Also installs as a ChatGPT app via Developer mode with the endpoint `https://konid.fly.dev/mcp`."
    - "Plays audio pronunciation directly through speakers using node-edge-tts (no
      external API key needed)."
    - "Returns cultural context and nuance comparison between options, not just a
      literal translation."
    - "MIT licensed; source at github.com/robertnowell/konid-language-learning."
    - "'konid' (کنید) is Farsi for 'do' — take action."
  angles:
    - {id: girlfriend-language, summary: "Trying to say something tender in a loved
        one's first language without sounding like a phrasebook", last_used: '2026-04-25'}
    - {id: translate-and-learn, summary: "Using daily professional translation as
        a language-learning loop instead of a one-shot utility", last_used: '2026-04-26'}
    - {id: register-matters, summary: "The same phrase can be casual, neutral, or
        tender — the choice signals the relationship (long-form)", last_used: '2026-04-27'}
    - {id: audio-fluency, summary: "Why hearing the tone contour and vowel length
        changes what you actually remember", last_used: '2026-04-28'}
    - {id: one-server-three-clients, summary: "Same MCP brain across Claude Code,
        Cowork, and ChatGPT — write once, four clients (long-form)", last_used: '2026-04-29'}
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

rabbitholes:
  repo: https://github.com/robertnowell/rabbitholes
  kind: chrome-extension
  audience: knowledge-workers
  status: live
  problem: "I wanted Wikipedia on every page. Every article I read has words I half-know
    and concepts that would open up if I just knew what they meant. But opening a
    new tab kills my focus, and skipping past them leaves me with a shallow read.
    I wanted all the world's knowledge one highlight away, inline, on every page,
    all the time."
  solution_one_liner: "A Chrome extension that turns any selected text into an inline
    explanation and lets you dig into any word in the response without leaving the
    page."
  facts:
    - "Highlights text → shadow-DOM tooltip renders an explanation from Claude Haiku
      4.5 next to your cursor. Doesn't pollute the host page."
    - "Click any word in the explanation to explore it further. Drag across words
      to pick a phrase."
    - "Every answer ends with two suggested rabbit-hole topics — the most interesting
      threads from here, one click away."
    - "Pencil icon reveals a free-form follow-up input that inherits current context
      as background."
    - "Globe icon re-answers the query enriched with Brave Search results, with source
      chips you can click."
    - "Rabbit-hole counter tracks how many hops deep you've gone. Hit 'philosophy'
      and you get a shareable trail."
    - "Zero analytics, zero telemetry, no intermediary server. Requests go directly
      from your browser to api.anthropic.com and api.search.brave.com."
    - "Manifest V3. Anthropic API key stored in chrome.storage.sync (encrypted, never
      leaves the browser)."
  angles:
    - {id: wikipedia-everywhere, summary: "The 'Wikipedia on every page' feeling —
        all the world's knowledge one highlight away", last_used: '2026-04-27'}
    - {id: half-known-concepts, summary: "Every article has words you half-know that
        would open up if you just knew what they meant", last_used: '2026-04-28'}
    - {id: curiosity-without-losing-place, summary: "Following a tangent without killing
        the thread you were actually reading", last_used: '2026-04-23'}
    - {id: philosophy-counter, summary: "The rabbit-hole counter and the Wikipedia-philosophy
        game, for your own reading trails", last_used: '2026-04-24'}
    - {id: shadow-dom, summary: "Design note: why shadow DOM beat iframe overlay for
        on-page tooltips (long-form)", last_used: '2026-04-25'}
    - {id: no-telemetry, summary: "Design note: privacy-native by construction — direct
        browser-to-API, no intermediary server (long-form)", last_used: '2026-04-26'}
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

