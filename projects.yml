marketing-pipeline:
  repo: https://github.com/robertnowell/marketing-pipeline
  kind: claude-skill
  audience: claude-code-users
  status: live
  problem: You built something useful, posted it once, got silence, and moved on
    — because doing distribution consistently takes time you don't have and 
    skills you never wanted to develop. Most OSS tools die not because they're 
    bad but because nobody keeps showing up for them.
  solution_one_liner: 'marketing-pipeline automates the recurring work of distributing
    open source developer tools: directory listings, social posts across four platforms,
    and daily content rotation — configured once, runs without daily intervention.'
  facts:
    - 'Onboarding a project takes one command: `marketing onboard --name my-tool --repo
      owner/repo --kind mcp-server` — it fetches the README, sends it to Claude, and
      saves problem, facts, and angles to projects.yml'
    - "The anti-slop gate in pipeline/antislop.py hard-rejects specific tokens before
      any post is published: 'excited', 'game-changer', 'unlock', 'empower', 'AI-powered',
      emoji, hashtags, exclamation points, and rhetorical questions"
    - 'Per-channel length limits are enforced: Bluesky 300 chars, Mastodon 500, X
      280, Dev.to/Hashnode 150-400 words'
    - Automated posting covers Bluesky, Dev.to, Hashnode, and Mastodon; 
      automated directory listing covers the official MCP Registry, Smithery, 
      and GitHub Topics
    - The daily cron (`marketing cycle`) runs via GitHub Actions at 14:00 UTC on
      weekdays, rotating through projects × angles × channels and picking the 
      least-recently-used angle
    - 'The `kind` field routes projects to type-specific directories: mcp-server gets
      MCP Registry/Smithery/Glama/PulseMCP; claude-skill gets awesome-claude-code;
      browser-extension gets Chrome Web Store/Firefox AMO/Edge Add-ons'
    - awesome-claude-code submission cannot be automated — the pipeline 
      generates the payload but their rules require a human to submit via their 
      GitHub issue form, once per project
    - The pipeline requires an Anthropic API key plus credentials for at least 
      Bluesky, Dev.to, and Hashnode to draft and post; Mastodon and Slack are 
      optional
  angles:
    - id: launch
      summary: Built to solve the 'I built it, nobody came' problem specifically
        for MCP servers, Claude Code skills, and agent-focused tools — where the
        ecosystem moves fast but distribution infrastructure doesn't exist yet 
        for most indie builders
      last_used: '2026-04-25'
    - id: problem-specific
      summary: You launch, get a small spike, then posting stops because it's 
        repetitive manual work. This pipeline's daily cron keeps rotating 
        content across channels without you doing anything after initial setup
      last_used: '2026-04-27'
    - id: how-it-works
      summary: Every generated draft passes through a regex blacklist before it 
        can be published — specific banned tokens, structural patterns like 
        rhetorical questions, and per-channel character limits are all enforced 
        in code, not by prompting Claude to 'sound natural'
      last_used: '2026-04-29'
    - id: comparison
      summary: Manually cross-posting means you write for each platform, 
        remember character limits, track which angle you used last, and do it 
        again next week. This pipeline stores angles in projects.yml, tracks 
        recency, and handles the per-channel formatting constraints 
        automatically
      last_used: '2026-04-21'
    - id: use-case
      summary: You've published an MCP server and want it indexed where 
        developers actually look — the launch command hits the official MCP 
        Registry (which Glama and PulseMCP pull from automatically), Smithery, 
        and GitHub Topics in one step, then drafts and posts to social channels
      last_used: '2026-04-23'
kopi:
  repo: https://trykopi.ai
  kind: saas-email-tool
  audience: ecom-solopreneurs
  status: live
  problem: Email marketing tools give you a blank canvas and a template library 
    — you still spend hours building each campaign from scratch, and you have no
    idea if the design is good until you send it.
  solution_one_liner: AI email design tool that generates complete emails from a
    brief and scores every design on layout, mobile readability, and CTA 
    contrast before it ships.
  facts:
    - Generates complete HTML emails from a text prompt in under 5 minutes
    - Every email gets an automated design critique scoring layout hierarchy, 
      mobile readability, CTA contrast, and 12+ other criteria on a 0-100 scale
    - Public gallery at trykopi.ai/emails shows 400+ emails scoring 80+ out of 
      100
    - Integrates with Klaviyo for direct campaign export
    - Works as an MCP server for Claude Code, Cursor, and ChatGPT
    - Supports brand-specific design systems — learns your fonts, colors, and 
      layout preferences
  angles:
    - id: showcase
      summary: Highlight a top-scoring email design with its screenshot and 
        critique score
      last_used: '2026-04-26'
    - id: before-after
      summary: Show what a brief looks like vs what Kopi generates from it
      last_used: '2026-04-28'
    - id: design-critique
      summary: Focus on the automated scoring — what makes a 93/100 email 
        different from a 70
      last_used: '2026-04-20'
    - id: time-savings
      summary: Hours spent building emails manually vs minutes with Kopi
      last_used: '2026-04-22'
    - id: brand-consistency
      summary: How the design system ensures every email matches the brand
      last_used: '2026-04-24'
  content_source:
    type: kopi
    base_url: https://trykopi.ai
    gallery_url: https://trykopi.ai/api/emails/gallery
