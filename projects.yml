# projects.yml — source of truth for what the pipeline knows about each project.
# Add a new project = add a YAML block. No code changes needed.
#
# Required fields per project:
#   repo                — github URL
#   kind                — what the project IS (maps into surfaces.yml kinds)
#   audience            — who the project is FOR (maps into surfaces.yml audiences)
#   status              — live | wip | archived
#   problem             — concrete problem in TARGET USER'S language (not AI-industry language)
#   solution_one_liner  — what the project does, one sentence, no fluff
#   facts[]             — the ONLY claims the drafter is allowed to make; validator grounds against this
#   angles[]            — rotation pool; drafter picks one per post
#   channels[]          — which daily-loop channels to post to (subset of audience.daily_social + content_blogs)
#
# Voice rule: `problem` and `solution_one_liner` are read verbatim into the drafter prompt.
# Write them the way the target user would describe the problem to a friend, not the way
# a product page would.

konid:
  repo: https://github.com/robertnowell/konid-language-learning
  kind: mcp-server
  audience: mcp-users
  status: live
  problem: "Google Translate still tells Spanish learners 'estoy caliente' means 'I'm hot'. It doesn't. Literal translation misses register, formality, and the cultural tone that makes you sound like a native speaker instead of a tourist."
  solution_one_liner: "A language coach that returns three options (casual to formal) for anything you want to say, with cultural context, nuance notes, and audio pronunciation."
  facts:
    - "Returns 3 options per query, ordered casual → formal, with the register explained."
    - "Supports 13+ languages including Mandarin, Japanese, Korean, Spanish, French, German, Portuguese, Italian, Russian, Arabic, and Hindi."
    - "Works as an MCP server with Claude Code (`claude mcp add konid-ai -- npx -y konid-ai`), Cursor, VS Code Copilot, Windsurf, Zed, JetBrains, and Claude Cowork."
    - "Also installs as a ChatGPT app via Developer mode with the endpoint `https://konid.fly.dev/mcp`."
    - "Plays audio pronunciation directly through speakers using node-edge-tts (no external API key needed)."
    - "Returns cultural context and nuance comparison between options, not just a literal translation."
    - "MIT licensed; source at github.com/robertnowell/konid-language-learning."
    - "'konid' (کنید) is Farsi for 'do' — take action."
  angles:
    - { id: caliente-bug, summary: "The 'estoy caliente' problem — literal translation vs register", last_used: null }
    - { id: three-options, summary: "Why returning 3 options at different formality levels beats one answer", last_used: null }
    - { id: audio-matters, summary: "Why hearing the pronunciation matters more than reading it", last_used: null }
    - { id: one-server-three-clients, summary: "Same MCP brain across Claude Code, ChatGPT, Cowork", last_used: null }
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

rabbitholes:
  repo: https://github.com/robertnowell/rabbitholes
  kind: chrome-extension
  audience: knowledge-workers
  status: live
  problem: "You hit a term in an article you don't know. You open a new tab, search, read, close the tab, come back, lose your place, forget what you were reading about. Research on the web is death by a thousand context switches."
  solution_one_liner: "A Chrome extension that turns any selected text into an inline explanation and lets you dig into any word in the response without leaving the page."
  facts:
    - "Highlights text → shadow-DOM tooltip renders an explanation from Claude Haiku 4.5 next to your cursor. Doesn't pollute the host page."
    - "Click any word in the explanation to explore it further. Drag across words to pick a phrase."
    - "Every answer ends with two suggested rabbit-hole topics — the most interesting threads from here, one click away."
    - "Pencil icon reveals a free-form follow-up input that inherits current context as background."
    - "Globe icon re-answers the query enriched with Brave Search results, with source chips you can click."
    - "Rabbit-hole counter tracks how many hops deep you've gone. Hit 'philosophy' and you get a shareable trail."
    - "Zero analytics, zero telemetry, no intermediary server. Requests go directly from your browser to api.anthropic.com and api.search.brave.com."
    - "Manifest V3. Anthropic API key stored in chrome.storage.sync (encrypted, never leaves the browser)."
  angles:
    - { id: context-loss, summary: "The tab-switching research-death problem", last_used: null }
    - { id: shadow-dom, summary: "Why shadow DOM was the right choice over iframe overlay", last_used: null }
    - { id: philosophy-counter, summary: "The rabbit-hole counter + philosophy endpoint", last_used: null }
    - { id: no-telemetry, summary: "Why a privacy-native browser extension matters in 2026", last_used: null }
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

