klein-blue:
  repo: "local: ~/klein-terminal-theme"  # [U] — not pushed to GitHub yet; pipeline should skip directory PRs until a public repo exists
  kind: terminal-theme
  audience: claude-code-users
  status: live
  problem: "Claude Code is mostly prose. Tool output, reasoning, permission prompts,
    explanations — I read paragraphs of it for hours every day. Most terminal themes
    are tuned for code syntax highlighting; they're optimizing for the wrong thing
    when your screen is 80% English. I wanted a theme tuned for comfortable prose
    reading at body size over long sessions, with a single anchor color I actually
    cared about."
  solution_one_liner: "Four Claude Code terminal themes built around Yves Klein's
    IKB pigment — APCA-verified for body-size prose legibility, tuned for the specific
    ANSI slots Claude Code uses for tool output, reasoning, and permission prompts."
  facts:
    - "Four variations: Klein Void Refined (balanced), Klein Void Sand & Sea (Claude-brand
      two-hero), Klein Void Prot (fully APCA-verified), Klein Void Gallery (one-blue
      maximum void)."
    - "Uses APCA Lc contrast metric with per-role gates: body >= 90, subtle >= 75,
      muted >= 45, accent >= 60. V3 Prot is the only variation where every accent
      passes strict gates."
    - "Pure IKB (#002FA7) fails APCA contrast as text on dark ground (Lc -12, effectively
      invisible). Split across two ANSI slots — pure IKB in ansi:blue (decorative
      borders/highlights) and lifted Klein-family #A8BEF0 in ansi:blueBright (readable
      permission-prompt text)."
    - "Ships as macOS Terminal.app .terminal profile files. Built from build.m with
      a variation-aware Objective-C builder, installed via install.sh, fully rollback-able
      via restore.sh."
    - "Requires Claude Code's `/theme` picker set to dark-ansi — otherwise Claude
      Code uses its hardcoded RGB palette and the ANSI theme is ignored."
    - "Ships with two font options: CommitMono-Regular (V1, V3) and IBM Plex Mono
      (V2, V4), both installed to ~/Library/Fonts/."
    - "Targets Claude Code specifically: the ansi:redBright slot — which Claude Code
      uses for the claude-sand brand color — is the differentiating moment between
      variations (neutralize for no brand competition vs accept as second hero)."
  angles:
    - {id: prose-not-code, summary: "Claude Code is 80% prose — most terminal themes
        are optimizing for the wrong thing", last_used: '2026-04-26'}
    - {id: ikb-mystique, summary: "What makes International Klein Blue so powerful
        — depth, void, one specific pigment registered in 1960", last_used: '2026-04-27'}
    - {id: reading-for-hours, summary: "Designing a terminal theme for comfortable
        body-size prose reading over long sessions, not code scanning", 
        last_used: '2026-04-28'}
    - {id: four-variations, summary: "Four themes instead of one — each answers the
        'how should Claude's brand color live in my terminal' question differently",
      last_used: '2026-04-23'}
    - {id: apca-gates, summary: "Design note: APCA per-role gates and why WCAG ratios
        lie on dark ground (long-form)", last_used: '2026-04-24'}
    - {id: ikb-split, summary: "Design note: the pure-IKB-is-invisible-as-text problem
        and the two-slot fix (long-form)", last_used: '2026-04-25'}
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

skill-tree:
  repo: https://github.com/robertnowell/ai-fluency-skill-cards
  kind: claude-code-plugin
  audience: claude-code-users
  status: live
  problem: "I've been using Claude Code every day for months and I have no idea if
    I'm getting better or just getting faster at the same few habits. Anthropic put
    out a study in February measuring 11 observable collaboration behaviors across
    9,830 Claude conversations — I wanted to know what MINE look like against that
    baseline, and more importantly, which behaviors I never touch."
  solution_one_liner: "Analyzes your Claude Code or Cowork session history, classifies
    11 observable behaviors from Anthropic's AI Fluency Index, assigns one of seven
    character archetype cards, and picks a behavior you haven't tried as a growth
    quest for your next session."
  facts:
    - "Uses Anthropic's AI Fluency Index (Feb 2026, 9,830 Claude conversations studied)
      as the population baseline. Classifies the same 11 observable behaviors on your
      own sessions."
    - "Behavior taxonomy + three axes (Description, Discernment, Delegation) come
      from Dakan & Feller's 4D AI Fluency Framework (Diligence is the fourth axis,
      not visible in chat logs)."
    - "Seven archetype cards, rendered as tarot cards with curated museum art. See
      live example at skill-tree-ai.fly.dev/fixture/illuminator."
    - "Remote classifier runs on Fly.io (Claude Haiku), hosted visualization stored
      on a Fly.io volume, stable URL returned per analysis."
    - "Installs in Claude Code via plugin marketplace: `claude plugin marketplace
      add robertnowell/ai-fluency-skill-cards && claude plugin install skill-tree-ai@ai-fluency-skill-cards`.
      Also works in Cowork via `skill-tree-ai.zip`."
    - "7-step orchestration takes ~30–60 seconds end-to-end: find session files →
      extract user messages → remote classifier → archetype assignment → narrative
      synthesis → render → return URL."
    - "Growth quest persists across sessions via SessionStart hook. Claude Code uses
      durable `~/.skill-tree/` path; Cowork uses `$CLAUDE_PLUGIN_ROOT/.user-state/`
      because of its ephemeral $HOME."
    - "Also available as an MCP server (npm package `skill-tree-ai`) for non-plugin
      clients like Cursor, VS Code, Windsurf."
  angles:
    - {id: am-i-getting-better, summary: "Using Claude daily but having no idea whether
        you're improving or just plateauing in a few habits that feel efficient",
      last_used: '2026-04-25'}
    - {id: fluency-on-my-conversations, summary: "Running Anthropic's 11-behavior
        classification against your own session history to see what YOURS look like
        against the population baseline", last_used: '2026-04-26'}
    - {id: what-you-avoid, summary: "Why the growth quest picks a behavior you AVOID,
        not something you already do well — the anti-local-optimum rule", 
        last_used: '2026-04-27'}
    - {id: archetype-card, summary: "The seven tarot-card archetypes (Illuminator,
        Navigator, Alchemist, four others) with curated museum art and a skill radar",
      last_used: '2026-04-29'}
    - {id: cowork-home, summary: "Design note: Cowork's ephemeral $HOME forced the
        dual-state-path design (long-form)", last_used: '2026-04-24'}
  channels: [bluesky, mastodon, devto, hashnode]
  launch: {}

