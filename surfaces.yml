# ═══════════════════════════════════════════════════════════════════════
# KINDS
# Additive directories applied on top of audience set, based on what the
# project IS. Full dict entries (not string refs) so kinds work across any
# audience, not just the audience where a directory was first defined.
# ═══════════════════════════════════════════════════════════════════════

kinds:
  # ─── Developer-tool kinds ───────────────────────────────────────────

  terminal-theme:
    directories_additive:
      # [V] 26.7k stars, cascades to Ghostty/WezTerm/Windows Terminal
      - { name: iterm2-color-schemes, repo: mbadolato/iTerm2-Color-Schemes, type: pr }
      # [V] Tinted Theming base16/base24 — one PR propagates to 70+ apps
      - { name: base16-schemes, repo: tinted-theming/schemes, type: pr }
      - { name: gogh, repo: Gogh-Co/Gogh, type: pr }
      # [U] Starship presets — verify CONTRIBUTING
      - { name: starship-presets, repo: starship/starship, type: pr }
    forums_additive: [r_unixporn]

  mcp-server:
    directories_additive:
      # Full dicts (not string refs) so MCP servers work in any audience
      - { name: mcp-registry, tool: mcp-publisher, type: cli }
      - { name: smithery, tool: smithery-cli, type: cli }
      - { name: glama, url: "https://glama.ai/mcp/servers", type: form }
      - { name: pulsemcp, url: "https://pulsemcp.com/submit", type: form }
      - { name: mcpservers, url: "https://mcpservers.org/submit", type: form }
      - { name: awesome-mcp-servers, repo: wong2/awesome-mcp-servers, type: pr }
    forums_additive: []

  claude-code-plugin:
    directories_additive:
      - { name: awesome-claude-code, repo: hesreallyhim/awesome-claude-code, type: pr }
      - { name: awesome-claude-plugins, repo: ccplugins/awesome-claude-code-plugins, type: pr }
      - { name: anthropic-plugins-form, url: "https://platform.claude.com/plugins/submit", type: form }
    forums_additive: [r_ClaudeAI]

  cli-audit-tool:
    directories_additive: []  # rely on audience directories

  saas-web-app:
    directories_additive: []  # rely on audience directories

  # ─── Generic / cross-audience kinds ─────────────────────────────────

  browser-extension:
    # Generic browser extension — works for Chrome, Firefox, Edge regardless
    # of audience. Full dicts so this kind can be applied to any audience
    # (knowledge-workers, general-consumers, marketing-ops, etc).
    directories_additive:
      - { name: chrome-web-store, url: "https://chrome.google.com/webstore/devconsole", type: form }
      - { name: firefox-amo, url: "https://addons.mozilla.org/developers/addon/submit", type: form }
      - { name: edge-addons, url: "https://microsoftedge.microsoft.com/addons/publish", type: form }
      - { name: awesome-webextensions, repo: fregante/Awesome-WebExtensions, type: pr }
    forums_additive: [r_chrome_extensions]

  chrome-extension:
    # Legacy alias for browser-extension — kept for backwards compatibility
    # with projects.yml entries that already use `kind: chrome-extension`.
    directories_additive:
      - { name: chrome-web-store, url: "https://chrome.google.com/webstore/devconsole", type: form }
      - { name: firefox-amo, url: "https://addons.mozilla.org/developers/addon/submit", type: form }
      - { name: edge-addons, url: "https://microsoftedge.microsoft.com/addons/publish", type: form }
      - { name: awesome-webextensions, repo: fregante/Awesome-WebExtensions, type: pr }
    forums_additive: [r_chrome_extensions]

  consumer-mobile-app:
    # App Store / Play Store submission is a release-process artifact, not a
    # marketing-pipeline action. The pipeline drafts copy for stores; the
    # human ships the build. What it CAN automate is directory submissions.
    directories_additive:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      - { name: taaft, url: "https://theresanaiforthat.com/submit", type: form }
    forums_additive: [r_apps, r_androidapps, r_iosapps]

  consumer-web-app:
    directories_additive:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      - { name: taaft, url: "https://theresanaiforthat.com/submit", type: form }
      - { name: futuretools, url: "https://futuretools.io/submit-a-tool", type: form }
      - { name: uneed, url: "https://uneed.best/submit", type: form }
    forums_additive: []

  b2b-saas:
    directories_additive:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      # [U] G2 and Capterra are paid/review-gated for most entries
      - { name: g2, url: "https://www.g2.com/products/new", type: form }
      - { name: capterra, url: "https://www.capterra.com/vendors/sign-up", type: form }
    forums_additive: []

  desktop-app:
    directories_additive:
      # [U] Setapp developers program, Homebrew cask — both have quality gates
      - { name: setapp-dev, url: "https://setapp.com/developers", type: form }
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
    forums_additive: [r_macapps, r_software]

  api-product:
    directories_additive:
      # [U] RapidAPI marketplace — verify submission flow
      - { name: rapidapi, url: "https://rapidapi.com/developer/new-api", type: form }
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
    forums_additive: [r_api, hn_show]

  creator-tool:
    # Tools for video/content creators (not "developer tools for creators")
    directories_additive:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: taaft, url: "https://theresanaiforthat.com/submit", type: form }
      - { name: futuretools, url: "https://futuretools.io/submit-a-tool", type: form }
    forums_additive: [r_NewTubers, r_youtubers, r_podcasting]

  workflow-automation:
    # Tools that build integrations / no-code automations
    directories_additive:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      # [U] Zapier public templates, n8n templates — verify submission flow
    forums_additive: [r_automation, r_nocode, r_zapier, r_n8n]
