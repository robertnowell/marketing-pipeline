# surfaces.yml — per-audience/kind channel + directory graph
#
# This is the piece that makes the pipeline project-agnostic. Audience + kind
# are the two keys. audience selects the social surfaces + base directories;
# kind layers on additive directories specific to the project type.
#
# Intentionally broader than dev tools: the same resolver handles a terminal
# theme for Claude Code users, a consumer AI app on the App Store, a B2B SaaS
# for marketing ops, or an API product for ops engineers.
#
# Sources marked [V] verified from primary docs during cross-audit.
# Sources marked [U] need fresh primary-source verification before code depends.
# Sources marked [TODO] are vertical placeholders for the user to populate.

audiences:
  # ═══════════════════════════════════════════════════════════════════
  # DEVELOPER AUDIENCES
  # ═══════════════════════════════════════════════════════════════════

  claude-code-users:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] 38k stars, dominant Claude Code list. Submission via GitHub issue form (not PR).
      - { name: awesome-claude-code, repo: hesreallyhim/awesome-claude-code, type: pr }
      # [V] 1.3k stars, curated. Fork + PR.
      - { name: awesome-claude-plugins, repo: ComposioHQ/awesome-claude-plugins, type: pr }
      # [V] Skills-focused curated list. Fork + PR.
      - { name: awesome-claude-skills-composio, repo: ComposioHQ/awesome-claude-skills, type: pr }
      # [V] 40+ entries, SKILL.md-focused. Fork + PR.
      - { name: awesome-claude-skills-travisvn, repo: travisvn/awesome-claude-skills, type: pr }
      # [V] Official Anthropic marketplace. Form-based review.
      - { name: claude-plugin-marketplace, url: "https://claude.ai/settings/plugins/submit", type: form }
      # [V] 36k skills, security-scanned (50+ rules). Web form.
      - { name: skillsdirectory, url: "https://www.skillsdirectory.com/", type: form }
      # [V] Visual aggregator. GitHub PR.
      - { name: awesomeclaude-ai, url: "https://awesomeclaude.ai", type: pr }
      # [V] Developer-specific Product Hunt alt. Free. Dofollow backlinks (DR 61).
      - { name: devhunt, url: "https://devhunt.org", type: form }
      # [V] 292k monthly. Every product gets featured. Web form.
      - { name: uneed, url: "https://www.uneed.best/submit-a-tool", type: form }
      # Auto-indexed (no submission needed):
      # - SkillsMP (96k+) — auto-scrapes GitHub for SKILL.md files
      # - claudemarketplaces.com — aggregates by install count + stars
      # - awesome-skills.com (148 skills) — trust/safety indicators
    watering_holes:
      # [U] Every entry below needs first-principles primary-source verification
      # in Week 2 before safari.py depends on it. Fetch each endpoint by hand,
      # confirm it returns real results for the claimed query, convert to [V] or remove.
      - { type: hn_algolia, query: "claude code", window_days: 7 }
      - { type: hn_algolia, query: "claude.md", window_days: 14 }
      - { type: reddit_search, sub: ClaudeAI, window_days: 7 }
      - { type: reddit_search, sub: ChatGPTCoding, window_days: 7 }
      - { type: github_issues, repos: ["anthropics/claude-code"], query: "is:issue" }
      - { type: bluesky_search, keywords: ["claude code", "claude.md", "claude skill", "claude plugin"] }
    forums_manual: [r_ClaudeAI, claude_discord_showcase, hn_show]

  mcp-users:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] mcp-publisher CLI cascades to PulseMCP/Smithery/Glama/mcp.so weekly
      - { name: mcp-registry, tool: mcp-publisher, type: cli }
      # [V] smithery.ai/docs/build/publish — URL-only for hosted servers
      - { name: smithery, tool: smithery-cli, type: cli }
      # [V] glama.ai/mcp/servers — live, Add Server button
      - { name: glama, url: "https://glama.ai/mcp/servers", type: form }
      # [V] pulsemcp.com/submit — single URL field, daily cascade
      - { name: pulsemcp, url: "https://pulsemcp.com/submit", type: form }
      # [V] mcpservers.org/submit — free 12h review
      - { name: mcpservers, url: "https://mcpservers.org/submit", type: form }
      # [V] wong2/awesome-mcp-servers — canonical
      - { name: awesome-mcp-servers, repo: wong2/awesome-mcp-servers, type: pr }
      # [U] Anthropic Connectors Directory — verify exact URL
      - { name: anthropic-connectors, url: "https://platform.claude.com/plugins/submit", type: form }
    watering_holes:
      # [U] Verify each endpoint in Week 2 before safari.py depends on them.
      - { type: hn_algolia, query: "mcp server", window_days: 7 }
      - { type: hn_algolia, query: "model context protocol", window_days: 14 }
      - { type: reddit_search, sub: LocalLLaMA, window_days: 7 }
      - { type: reddit_search, sub: mcp, window_days: 14 }
      - { type: reddit_search, sub: ClaudeAI, window_days: 7 }
      - { type: github_issues, repos: ["modelcontextprotocol/servers", "modelcontextprotocol/registry"], query: "is:issue" }
      - { type: bluesky_search, keywords: ["mcp server", "model context protocol", "mcp-publisher"] }
    forums_manual: [r_LocalLLaMA, r_ClaudeAI, hn_show]

  frontend-engineers:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Cooper Press — reply to the latest issue email
      - { name: cooper-press-js-weekly, contact: "reply to latest JS Weekly email", type: contact }
    forums_manual: [hn_show, r_javascript, r_webdev, r_frontend]

  ai-engineers:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Changelog News — 25k subs, 3 fields, rejects tutorials/commercial
      - { name: changelog-news, url: "https://changelog.com/news/submit", type: form }
      # [V] Console.dev — pre-1.0/beta gate hard
      - { name: console-dev, contact: "email hello@console.dev", type: contact }
    forums_manual: [r_LocalLLaMA, r_MachineLearning, hn_show]

  ops-and-sre:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [U] awesome-sysadmin + awesome-devops — verify each
      - { name: awesome-sysadmin, repo: awesome-foss/awesome-sysadmin, type: pr }
      - { name: awesome-devops, repo: wmariuss/awesome-devops, type: pr }
    forums_manual: [r_devops, r_sysadmin, r_kubernetes, r_homelab, hn_show]

  # ═══════════════════════════════════════════════════════════════════
  # KNOWLEDGE-WORKER / PROSUMER AUDIENCES
  # (Researchers, analysts, consultants, writers — the broad "info worker"
  #  slot that rabbitholes and any browser-based research tool targets.
  #  Renamed from `research-devs` — research is not just a dev activity.)
  # ═══════════════════════════════════════════════════════════════════

  knowledge-workers:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Chrome Web Store — $5 one-time dev fee
      - { name: chrome-web-store, url: "https://chrome.google.com/webstore/devconsole", type: form }
      # [V] Firefox AMO — free
      - { name: firefox-amo, url: "https://addons.mozilla.org/developers/addon/submit", type: form }
      # [V] Edge Add-ons — free
      - { name: edge-addons, url: "https://microsoftedge.microsoft.com/addons/publish", type: form }
      # [U] fregante/Awesome-WebExtensions — verify CONTRIBUTING
      - { name: awesome-webextensions, repo: fregante/Awesome-WebExtensions, type: pr }
    watering_holes:
      # [U] Verify each endpoint in Week 2 before safari.py depends on them.
      # Knowledge-worker pain is about context loss during research, not dev tooling.
      - { type: hn_algolia, query: "tab management research", window_days: 14 }
      - { type: hn_algolia, query: "wikipedia rabbit hole", window_days: 30 }
      - { type: reddit_search, sub: productivity, window_days: 14 }
      - { type: reddit_search, sub: ObsidianMD, window_days: 14 }
      - { type: reddit_search, sub: Zettelkasten, window_days: 30 }
      - { type: reddit_search, sub: chrome_extensions, window_days: 14 }
      - { type: bluesky_search, keywords: ["tab hoarding", "research tool", "close all tabs", "wikipedia rabbit hole"] }
    forums_manual:
      - r_productivity
      - r_notion
      - r_obsidianmd
      - r_zettelkasten
      - hn_show
      - product_hunt

  creative-prosumers:
    # Artists, designers, writers, video creators. Big on visual platforms.
    daily_social: [bluesky, mastodon, threads]
    content_blogs: []  # Substack / Medium are manual; no first-class automation surface
    directories:
      # [U] Product Hunt — one-shot per project, best for consumer/creator tools
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      # [U] AlternativeTo — 149k monthly, 2–7 day review, position as alternative to X
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      # [U] TAAFT — $347 one-off paid, refundable if rejected, 2.5M newsletter
      - { name: taaft, url: "https://theresanaiforthat.com/submit", type: form }
      # [U] futuretools.io — free form, Matt Wolfe reviews
      - { name: futuretools, url: "https://futuretools.io/submit-a-tool", type: form }
    forums_manual:
      - r_DigitalArt
      - r_creativity
      - r_midjourney
      - r_StableDiffusion
      - instagram_manual
      - tiktok_manual
      - youtube_manual
      - creator_discords_manual

  # ═══════════════════════════════════════════════════════════════════
  # CONSUMER AUDIENCES
  # (General public, non-technical. Real daily-automation surface here is
  #  thin — the channels where consumers live (TikTok, Instagram, YouTube)
  #  are either manual-only or require per-permission platform review.
  #  The pipeline's role is drafting assets for release + launch windows,
  #  not daily broadcast.)
  # ═══════════════════════════════════════════════════════════════════

  general-consumers:
    daily_social: [bluesky, mastodon, threads]  # Threads gated on Meta app review
    content_blogs: []
    directories:
      - { name: product-hunt-launch, url: "https://www.producthunt.com/posts/new", type: form }
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      - { name: taaft, url: "https://theresanaiforthat.com/submit", type: form }
      - { name: futuretools, url: "https://futuretools.io/submit-a-tool", type: form }
    forums_manual:
      - r_apps
      - r_ChatGPT
      - r_ArtificialInteligence  # [sic] — actual sub name
      - product_hunt
      - tiktok_manual
      - instagram_manual
      - youtube_manual

