# surfaces.yml — per-audience/kind channel + directory graph
# Sources marked [V] are verified from primary docs during cross-audit.
# Sources marked [U] need fresh primary-source verification before code depends on them.

audiences:
  # ──────────────────────────────────────────────────────────────────
  claude-code-users:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] 38k stars, highest-star Claude Code list
      - { name: awesome-claude-code, repo: hesreallyhim/awesome-claude-code, type: pr }
      # [U] ccplugins/awesome-claude-code-plugins — verify repo exists + CONTRIBUTING
      - { name: awesome-claude-plugins, repo: ccplugins/awesome-claude-code-plugins, type: pr }
      # [U] Claude plugins submission form — verify exact URL
      - { name: anthropic-plugins-form, url: "https://platform.claude.com/plugins/submit", type: form }
    forums_manual: [r_ClaudeAI, claude_discord_showcase, hn_show]

  # ──────────────────────────────────────────────────────────────────
  mcp-users:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] mcp-publisher CLI cascades to PulseMCP/Smithery/Glama/mcp.so weekly
      - { name: mcp-registry, tool: mcp-publisher, type: cli }
      # [V] smithery.ai/docs/build/publish — URL-only for hosted servers
      - { name: smithery, tool: smithery-cli, type: cli }
      # [V] glama.ai/mcp/servers — live page, Add Server button
      - { name: glama, url: "https://glama.ai/mcp/servers", type: form }
      # [V] pulsemcp.com/submit — single URL field, daily cascade
      - { name: pulsemcp, url: "https://pulsemcp.com/submit", type: form }
      # [V] mcpservers.org/submit — free 12h review
      - { name: mcpservers, url: "https://mcpservers.org/submit", type: form }
      # [V] wong2/awesome-mcp-servers — canonical
      - { name: awesome-mcp-servers, repo: wong2/awesome-mcp-servers, type: pr }
      # [U] Anthropic Connectors Directory form — verify exact URL
      - { name: anthropic-connectors, url: "https://platform.claude.com/plugins/submit", type: form }
    forums_manual: [r_LocalLLaMA, r_ClaudeAI, hn_show]

  # ──────────────────────────────────────────────────────────────────
  ecom-solopreneurs:
    daily_social: [bluesky, mastodon, indiehackers]
    content_blogs: [devto, hashnode, indiehackers_article]
    directories:
      # [U] AlternativeTo — 149k monthly, 2-7 day review, position as alternative-to
      - { name: alternativeto, url: "https://alternativeto.net/submit", type: form }
      # [U] Uneed — daily competition, free submission, DR 74
      - { name: uneed, url: "https://uneed.best/submit", type: form }
      # [U] DevHunt — free dev listing, DR 59
      - { name: devhunt, url: "https://devhunt.org/submit", type: form }
      # [U] IndieHackers Products listing — one-shot per project
      - { name: indiehackers-products, url: "https://indiehackers.com/products/add", type: form }
    forums_manual: [r_ecommerce, r_shopify, r_entrepreneur, indiehackers_main, product_hunt]

  # ──────────────────────────────────────────────────────────────────
  frontend-engineers:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Cooper Press — reply to the latest issue email
      - { name: cooper-press-js-weekly, contact: "reply to latest JS Weekly email" }
    forums_manual: [hn_show, r_javascript, r_webdev]

  # ──────────────────────────────────────────────────────────────────
  research-devs:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Chrome Web Store — $5 one-time dev fee
      - { name: chrome-web-store, url: "https://chrome.google.com/webstore/devconsole", type: form }
      # [V] Firefox AMO — free
      - { name: firefox-amo, url: "https://addons.mozilla.org/developers/addon/submit", type: form }
      # [V] Edge Add-ons — free
      - { name: edge-addons, url: "https://microsoftedge.microsoft.com/addons/publish", type: form }
      # [U] fregante/Awesome-WebExtensions — verify CONTRIBUTING
      - { name: awesome-webextensions, repo: fregante/Awesome-WebExtensions, type: pr }
    forums_manual: [r_chrome, r_chromeextensions, product_hunt, hn_show]

  # ──────────────────────────────────────────────────────────────────
  ai-engineers:
    daily_social: [bluesky, mastodon]
    content_blogs: [devto, hashnode]
    directories:
      # [V] Changelog News — 25k subs, 3 fields, rejects tutorials/commercial
      - { name: changelog-news, url: "https://changelog.com/news/submit", type: form }
      # [V] Console.dev — pre-1.0/beta gate hard
      - { name: console-dev, contact: "email hello@console.dev" }
    forums_manual: [r_LocalLLaMA, hn_show]

kinds:
  # Additive directories applied on top of audience set, based on what the project IS.

  terminal-theme:
    directories_additive:
      # [V] iTerm2-Color-Schemes — 26.7k stars, cascades to Ghostty/WezTerm/Windows Terminal
      - { name: iterm2-color-schemes, repo: mbadolato/iTerm2-Color-Schemes, type: pr }
      # [V] Tinted Theming base16/base24 — one PR propagates to 70+ apps
      - { name: base16-schemes, repo: tinted-theming/schemes, type: pr }
      # [V] Gogh — terminal palette collection
      - { name: gogh, repo: Gogh-Co/Gogh, type: pr }
      # [U] Starship presets — verify CONTRIBUTING
      - { name: starship-presets, repo: starship/starship, type: pr }
    forums_additive: [r_unixporn]

  chrome-extension:
    directories_additive:
      - firefox-amo
      - edge-addons
      - chrome-web-store

  mcp-server:
    directories_additive:
      - mcp-registry
      - smithery
      - glama
      - pulsemcp
      - mcpservers

  claude-code-plugin:
    directories_additive:
      - awesome-claude-code
      - awesome-claude-plugins
      - anthropic-plugins-form

  cli-audit-tool:
    directories_additive: []  # rely on audience directories

  saas-web-app:
    directories_additive: []  # rely on audience directories
