name: Daily post cycle + engagement report

on:
  schedule:
    # One project per invocation, spaced 2 hours apart across the day.
    # 5 fires/day every day (weekends too); each picks the next project
    # that hasn't posted today. If all posted, no-op.
    - cron: "0 10,12,14,16,18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (draft but don't publish)"
        type: boolean
        default: true

permissions:
  contents: write

# Only one run of this workflow active at a time — prevents two fires from
# racing on git push or posting the same project twice.
concurrency:
  group: marketing-pipeline-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_PAT: ${{ secrets.HASHNODE_PAT }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            marketing cycle --dry-run
          else
            marketing cycle
          fi

      - name: Commit updated state
        if: always() && inputs.dry_run != 'true'
        run: |
          git config user.name "marketing-pipeline[bot]"
          git config user.email "noreply@github.com"
          git add content/posted/ projects.yml
          git diff --cached --quiet || git commit -m "cycle: post $(date -u +%Y-%m-%d %H:%M)"
          git push

      - name: Engagement report + Slack digest
        if: always()
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_PAT: ${{ secrets.HASHNODE_PAT }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        # --no-sync: cron just committed posts and is at HEAD; no pull needed.
        run: marketing report --no-sync

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-${{ github.run_id }}
          path: |
            content/drafts/
            reports/metrics/
          if-no-files-found: ignore
